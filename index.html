<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice ESL Tutor Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 bg-slate-900 text-white flex items-center justify-between">
        <h1 class="text-sm font-semibold tracking-wide">🎙️ Voice English Tutor</h1>
        <span class="text-xs bg-slate-700 px-2 py-1 rounded-full">PoC Widget</span>
      </div>

      <div class="p-4 space-y-4">
        <div class="flex items-center gap-2">
          <label for="level" class="text-sm font-medium text-slate-700">Level:</label>
          <select id="level" class="border border-slate-300 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="A1">A1</option>
            <option value="A2">A2</option>
            <option value="B1" selected>B1</option>
            <option value="B2">B2</option>
          </select>
          <button id="speakToggle" class="ml-auto text-xs rounded-lg px-3 py-1.5 bg-emerald-100 text-emerald-800 hover:bg-emerald-200">
            Voice On
          </button>
        </div>

        <div id="status" class="text-xs text-slate-500">Ready. Press Record and speak.</div>

        <div id="chatWindow" class="h-72 overflow-y-auto border border-slate-200 rounded-xl p-3 bg-slate-50 space-y-3" aria-live="polite"></div>

        <div class="flex items-center gap-2">
          <button id="recordBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-xl transition">
            ⏺️ Record
          </button>
          <button id="stopBtn" class="px-3 py-2 rounded-xl border border-slate-300 text-slate-700 hover:bg-slate-100">
            Stop
          </button>
        </div>
      </div>
    </div>

    <script>
      const recordBtn = document.getElementById('recordBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusEl = document.getElementById('status');
      const chatWindow = document.getElementById('chatWindow');
      const levelEl = document.getElementById('level');
      const speakToggle = document.getElementById('speakToggle');

      let recognition;
      let isRecording = false;
      let voiceEnabled = true;

      function appendMessage(role, text) {
        const row = document.createElement('div');
        row.className = `text-sm leading-relaxed p-2 rounded-lg ${
          role === 'You' ? 'bg-blue-100 text-blue-900 ml-8' : 'bg-white border border-slate-200 mr-8'
        }`;
        row.innerHTML = `<strong>${role}:</strong> ${text}`;
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function speakText(text) {
        if (!voiceEnabled || !window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;
        utterance.pitch = 1;
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
      }

      async function sendToTutor(userText) {
        const level = levelEl.value;
        statusEl.textContent = 'Thinking...';

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: userText, level })
          });

          if (!res.ok) {
            throw new Error(`Server returned ${res.status}`);
          }

          const data = await res.json();
          const tutorReply = data.reply || 'Sorry, I could not generate a response.';
          appendMessage('Tutor', tutorReply);
          speakText(tutorReply.replace(/\[[^\]]*\]/g, '').trim());
          statusEl.textContent = 'Ready. Press Record and speak.';
        } catch (err) {
          console.error(err);
          statusEl.textContent = 'Error contacting tutor API.';
          appendMessage('Tutor', 'I had a connection problem. Please try again.');
        }
      }

      function initSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          statusEl.textContent = 'Speech recognition not supported in this browser.';
          recordBtn.disabled = true;
          stopBtn.disabled = true;
          return;
        }

        recognition = new SR();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        recognition.onstart = () => {
          isRecording = true;
          statusEl.textContent = 'Listening...';
          recordBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
          recordBtn.classList.add('bg-red-600', 'hover:bg-red-700');
          recordBtn.textContent = '🔴 Recording';
        };

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          appendMessage('You', transcript);
          sendToTutor(transcript);
        };

        recognition.onerror = (event) => {
          statusEl.textContent = `Speech error: ${event.error}`;
        };

        recognition.onend = () => {
          isRecording = false;
          recordBtn.classList.remove('bg-red-600', 'hover:bg-red-700');
          recordBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
          recordBtn.textContent = '⏺️ Record';
        };
      }

      recordBtn.addEventListener('click', () => {
        if (!recognition) return;
        if (isRecording) {
          recognition.stop();
          return;
        }
        recognition.start();
      });

      stopBtn.addEventListener('click', () => {
        if (recognition && isRecording) {
          recognition.stop();
          statusEl.textContent = 'Stopped.';
        }
      });

      speakToggle.addEventListener('click', () => {
        voiceEnabled = !voiceEnabled;
        speakToggle.textContent = voiceEnabled ? 'Voice On' : 'Voice Off';
        speakToggle.className = voiceEnabled
          ? 'ml-auto text-xs rounded-lg px-3 py-1.5 bg-emerald-100 text-emerald-800 hover:bg-emerald-200'
          : 'ml-auto text-xs rounded-lg px-3 py-1.5 bg-slate-200 text-slate-700 hover:bg-slate-300';
      });

      initSpeechRecognition();
      appendMessage('Tutor', 'Hello! I am your English tutor. Press Record and tell me about your day.');
    </script>
  </body>
</html>
