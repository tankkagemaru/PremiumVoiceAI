<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice ESL Tutor Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
    <style>
      @keyframes pulseGlow {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(239, 68, 68, 0.35);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 0 36px rgba(239, 68, 68, 0.35);
        }
      }

      @keyframes equalize {
        0%,
        100% {
          transform: scaleY(0.3);
        }
        50% {
          transform: scaleY(1);
        }
      }

      .voice-ring.speaking {
        animation: pulseGlow 1.1s ease-in-out infinite;
      }

      .voice-bar {
        transform-origin: bottom;
      }

      .speaking .voice-bar:nth-child(1) {
        animation: equalize 0.45s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(2) {
        animation: equalize 0.7s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(3) {
        animation: equalize 0.55s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(4) {
        animation: equalize 0.65s ease-in-out infinite;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-rose-50 via-red-100 to-rose-200"
  >
    <div
      class="w-full max-w-xl rounded-3xl border border-red-200/70 bg-white/90 shadow-2xl shadow-red-300/40 backdrop-blur overflow-hidden"
    >
      <div class="px-4 py-3 bg-gradient-to-r from-red-600 to-rose-500 text-white flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img
            src="https://drive.google.com/uc?export=download&id=1WBSAezD_na8I7zDovVpaMRhnlE6rmMG_"
            alt="Company logo"
            class="h-7 w-7 rounded-md bg-white/90 object-cover p-0.5"
          />
          <h1 class="text-sm font-semibold tracking-wide">🎙️ Voice English Tutor</h1>
        </div>
        <span class="text-xs bg-white/20 px-2 py-1 rounded-full">PoC Widget</span>
      </div>

      <div class="p-4 space-y-4">
        <div class="flex items-center justify-between rounded-2xl bg-red-50 border border-red-100 px-3 py-2">
          <div>
            <p class="text-xs uppercase tracking-wide text-red-500 font-semibold">Tutor Voice</p>
            <p class="text-sm text-red-900 font-medium">Live audio feedback</p>
          </div>
          <div id="voiceRing" class="voice-ring rounded-full bg-red-100 p-2.5 border border-red-200">
            <div id="voiceBars" class="flex items-end gap-0.5 h-5">
              <span class="voice-bar block h-2 w-1 rounded bg-red-500"></span>
              <span class="voice-bar block h-4 w-1 rounded bg-red-500"></span>
              <span class="voice-bar block h-3 w-1 rounded bg-red-500"></span>
              <span class="voice-bar block h-5 w-1 rounded bg-red-500"></span>
            </div>
          </div>
        </div>

        <!-- SETUP PANEL -->
        <section id="setupPanel" class="space-y-3">
          <h2 class="text-sm font-semibold text-slate-700">Set up your session</h2>

          <div class="grid grid-cols-2 gap-2">
            <div>
              <label for="mode" class="block text-xs font-medium text-slate-600 mb-1">Mode</label>
              <select
                id="mode"
                class="w-full border border-red-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
              >
                <option value="conversation" selected>Speaking (Conversation)</option>
                <option value="word">Pronunciation Practice</option>
              </select>
            </div>
            <div>
              <label for="level" class="block text-xs font-medium text-slate-600 mb-1">Level</label>
              <select
                id="level"
                class="w-full border border-red-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
              >
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1" selected>B1</option>
                <option value="B2">B2</option>
              </select>
            </div>
          </div>

          <div id="topicGroup">
            <label for="topic" class="block text-xs font-medium text-slate-600 mb-1">
              Enter a topic to discuss
            </label>
            <input
              id="topic"
              type="text"
              maxlength="200"
              placeholder="e.g., my favourite hobby, holidays in Malaysia"
              class="w-full border border-red-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
            />
          </div>

          <div id="wordsGroup" hidden>
            <label for="wordList" class="block text-xs font-medium text-slate-600 mb-1">
              Enter words you want to practice
            </label>
            <input
              id="wordList"
              type="text"
              placeholder="e.g., apple, banana, pineapple"
              class="w-full border border-red-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"
            />
          </div>

          <p id="setupError" class="text-xs text-red-600 hidden"></p>
          <p id="setupStatus" class="text-xs text-slate-500">Loading speech service...</p>

          <button
            id="startSessionBtn"
            disabled
            class="w-full min-h-11 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-semibold py-2.5 px-4 rounded-xl transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Start Session →
          </button>
        </section>

        <!-- CHAT PANEL -->
        <section id="chatPanel" hidden class="space-y-3">
          <div class="flex items-center justify-between gap-2 rounded-lg bg-red-50 border border-red-100 px-3 py-2">
            <div id="sessionLabel" class="text-xs text-red-900 font-medium truncate"></div>
            <div class="flex items-center gap-2 shrink-0">
              <button
                id="speakToggle"
                class="text-xs rounded-lg px-2.5 py-1 bg-red-100 text-red-800 hover:bg-red-200"
              >
                Voice On
              </button>
              <button
                id="resetBtn"
                class="text-xs rounded-lg px-2.5 py-1 bg-slate-100 text-slate-700 hover:bg-slate-200"
              >
                New Session
              </button>
            </div>
          </div>

          <div id="status" class="text-xs text-slate-500">Ready. Press Record and speak.</div>

          <div
            id="chatWindow"
            class="h-72 overflow-y-auto border border-red-100 rounded-xl p-3 bg-rose-50/70 space-y-3"
            aria-live="polite"
          ></div>

          <div class="flex items-center gap-2">
            <button
              id="recordBtn"
              class="flex-[2] min-h-12 whitespace-nowrap bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-semibold py-3 px-4 rounded-xl transition disabled:opacity-50"
            >
              ⏺️ Record
            </button>
            <button
              id="stopBtn"
              class="px-4 py-3 min-h-12 rounded-xl border border-red-200 text-red-700 hover:bg-red-50"
            >
              Stop
            </button>
          </div>
        </section>
      </div>
    </div>

    <script>
      const setupPanel = document.getElementById('setupPanel');
      const chatPanel = document.getElementById('chatPanel');
      const setupError = document.getElementById('setupError');
      const setupStatus = document.getElementById('setupStatus');
      const startSessionBtn = document.getElementById('startSessionBtn');
      const sessionLabel = document.getElementById('sessionLabel');
      const resetBtn = document.getElementById('resetBtn');
      const recordBtn = document.getElementById('recordBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusEl = document.getElementById('status');
      const chatWindow = document.getElementById('chatWindow');
      const levelEl = document.getElementById('level');
      const modeEl = document.getElementById('mode');
      const topicEl = document.getElementById('topic');
      const topicGroup = document.getElementById('topicGroup');
      const wordsGroup = document.getElementById('wordsGroup');
      const wordListEl = document.getElementById('wordList');
      const speakToggle = document.getElementById('speakToggle');
      const voiceRing = document.getElementById('voiceRing');
      const voiceBars = document.getElementById('voiceBars');

      const AVAILABLE_VOICES = ['alloy', 'ash', 'ballad', 'coral', 'echo', 'fable', 'onyx', 'nova', 'sage', 'shimmer'];
      const sessionVoice = AVAILABLE_VOICES[Math.floor(Math.random() * AVAILABLE_VOICES.length)];

      let azureToken = null;
      let azureRegion = null;
      let tokenExpiresAt = 0;
      let activeRecognizer = null;
      let isRecording = false;
      let voiceEnabled = true;
      let currentAudio;
      let sessionConfig = null;
      const conversationHistory = [];

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function formatSimpleMarkdown(text) {
        const escaped = escapeHtml(text);
        return escaped
          .replace(
            /\[([^\]]+)\]/g,
            '<span class="inline-block rounded-md bg-red-50 border border-red-200 px-1.5 py-0.5 text-red-800 font-medium">[$1]</span>'
          )
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>');
      }

      function splitTutorReply(text) {
        const allCorrections = [...text.matchAll(/\[([^\]]+)\]/g)].map((m) => m[1].trim()).filter(Boolean);
        const main = text.replace(/\[[^\]]+\]/g, '').replace(/\s{2,}/g, ' ').trim();
        return { corrections: allCorrections, main: main || text.trim() };
      }

      function appendTutorMessage(text) {
        const row = document.createElement('div');
        row.className = 'text-sm leading-relaxed p-2 rounded-lg bg-white border border-red-100 mr-8 space-y-2';

        const { corrections, main } = splitTutorReply(text);
        const correctionBlock = corrections.length
          ? `<section class="rounded-lg border-2 border-red-300 bg-red-50 px-3 py-2 shadow-sm">
              <p class="text-[11px] font-semibold tracking-wide uppercase text-red-700 mb-1">Correction Note</p>
              ${corrections
                .map(
                  (c) =>
                    `<p class="text-sm italic font-medium text-red-900"><em>${escapeHtml(c)}</em></p>`
                )
                .join('')}
            </section>`
          : '';
        const mainBlock = `<section class="rounded-lg border border-slate-200 bg-white px-3 py-2">
            <p><strong>Tutor:</strong> ${formatSimpleMarkdown(main || text)}</p>
          </section>`;
        row.innerHTML = `${correctionBlock}${mainBlock}`;

        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function wordClassFor(errorType, score) {
        switch (errorType) {
          case 'Mispronunciation':
            return 'rounded px-1 bg-red-200 text-red-900 underline decoration-wavy decoration-red-600';
          case 'Omission':
            return 'rounded px-1 bg-amber-100 text-amber-900 italic line-through';
          case 'Insertion':
            return 'rounded px-1 bg-purple-100 text-purple-900 italic';
          case 'UnexpectedBreak':
          case 'MissingBreak':
          case 'Monotone':
            return 'rounded px-1 bg-blue-100 text-blue-900';
          default:
            if (typeof score === 'number') {
              if (score < 60) return 'rounded px-1 bg-red-100 text-red-800';
              if (score < 80) return 'rounded px-1 bg-amber-100 text-amber-800';
            }
            return '';
        }
      }

      function renderAssessedWords(words) {
        if (!Array.isArray(words) || !words.length) return '';
        return words
          .map((w) => {
            const word = escapeHtml(w.Word || '');
            const a = w.PronunciationAssessment || {};
            const errorType = a.ErrorType || 'None';
            const score = typeof a.AccuracyScore === 'number' ? a.AccuracyScore : null;
            const cls = wordClassFor(errorType, score);
            const titleParts = [];
            if (score !== null) titleParts.push(`Accuracy ${Math.round(score)}`);
            if (errorType && errorType !== 'None') titleParts.push(errorType);
            const title = titleParts.length ? ` title="${escapeHtml(titleParts.join(' · '))}"` : '';
            return `<span class="${cls}"${title}>${word}</span>`;
          })
          .join(' ');
      }

      function scoreChipClass(value) {
        if (value >= 80) return 'bg-green-100 text-green-800 border-green-200';
        if (value >= 60) return 'bg-amber-100 text-amber-800 border-amber-200';
        return 'bg-red-200 text-red-900 border-red-300';
      }

      function renderScoreChips(pron) {
        const entries = [
          ['ACC', pron.accuracyScore, 'Accuracy'],
          ['FLU', pron.fluencyScore, 'Fluency'],
          ['COMP', pron.completenessScore, 'Completeness'],
          ['PROS', pron.prosodyScore, 'Prosody']
        ];
        const chips = entries
          .filter(([, value]) => typeof value === 'number' && !Number.isNaN(value))
          .map(
            ([label, value, full]) =>
              `<span class="text-xs font-bold uppercase tracking-wide rounded-md border px-2 py-1 ${scoreChipClass(
                value
              )}" title="${full} ${Math.round(value)} / 100">
                ${label} <span class="ml-0.5">${Math.round(value)}</span>
              </span>`
          );
        if (!chips.length) return '';
        return `<div class="flex flex-wrap gap-1.5 pt-1">${chips.join('')}</div>`;
      }

      function appendUserMessage(text, pron) {
        const row = document.createElement('div');
        row.className =
          'text-sm leading-relaxed p-2 rounded-lg bg-red-100 text-red-900 ml-8 border border-red-200 space-y-2';

        const words = pron && pron.detailResult && pron.detailResult.Words;
        const transcriptHtml = words && words.length ? renderAssessedWords(words) : escapeHtml(text);
        const scoreBlock = pron ? renderScoreChips(pron) : '';

        row.innerHTML = `
          <p><strong>You:</strong> ${transcriptHtml}</p>
          ${scoreBlock}
        `;

        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function setVoiceAnimation(isSpeaking) {
        const method = isSpeaking ? 'add' : 'remove';
        voiceRing.classList[method]('speaking');
        voiceBars.classList[method]('speaking');
      }

      function pushHistory(role, content) {
        conversationHistory.push({ role, content });
        if (conversationHistory.length > 8) {
          conversationHistory.splice(0, conversationHistory.length - 8);
        }
      }

      async function speakText(text) {
        if (!voiceEnabled) return;
        const cleanText = text.replace(/\[[^\]]*\]/g, '').trim();
        if (!cleanText) return;

        try {
          const res = await fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: cleanText, voice: sessionVoice })
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || `TTS failed (${res.status})`);
          }

          const audioBlob = await res.blob();
          const audioUrl = URL.createObjectURL(audioBlob);

          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
          }

          currentAudio = new Audio(audioUrl);
          currentAudio.onplay = () => setVoiceAnimation(true);
          currentAudio.onpause = () => setVoiceAnimation(false);
          currentAudio.onended = () => {
            setVoiceAnimation(false);
            URL.revokeObjectURL(audioUrl);
          };
          await currentAudio.play();
        } catch (err) {
          setVoiceAnimation(false);
          console.error('TTS error:', err);
          appendTutorMessage(`[Audio unavailable: ${err.message}]`);
        }
      }

      function summarizeAssessment(pron) {
        if (!pron) return null;
        const scores = {};
        if (typeof pron.accuracyScore === 'number') scores.accuracy = pron.accuracyScore;
        if (typeof pron.fluencyScore === 'number') scores.fluency = pron.fluencyScore;
        if (typeof pron.completenessScore === 'number') scores.completeness = pron.completenessScore;
        if (typeof pron.prosodyScore === 'number') scores.prosody = pron.prosodyScore;

        const detailWords = pron.detailResult && pron.detailResult.Words;
        const words = Array.isArray(detailWords)
          ? detailWords.map((w) => ({
              word: w.Word || '',
              errorType: w.PronunciationAssessment?.ErrorType || 'None',
              accuracy:
                typeof w.PronunciationAssessment?.AccuracyScore === 'number'
                  ? w.PronunciationAssessment.AccuracyScore
                  : null
            }))
          : [];

        return { scores, words };
      }

      async function callChat(payload) {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Server returned ${res.status}`);
        return data.reply || '';
      }

      async function fetchOpener() {
        return callChat({
          isOpening: true,
          level: sessionConfig.level,
          mode: sessionConfig.mode,
          topic: sessionConfig.topic,
          words: sessionConfig.words,
          history: []
        });
      }

      async function sendToTutor(userText, assessment) {
        statusEl.textContent = 'Thinking...';
        try {
          const reply = await callChat({
            text: userText,
            level: sessionConfig.level,
            mode: sessionConfig.mode,
            topic: sessionConfig.topic,
            words: sessionConfig.words,
            assessment,
            history: conversationHistory
          });
          const tutorReply = reply || 'Sorry, I could not generate a response.';
          appendTutorMessage(tutorReply);
          pushHistory('assistant', tutorReply);
          await speakText(tutorReply);
          statusEl.textContent = 'Ready. Press Record and speak.';
        } catch (err) {
          console.error(err);
          statusEl.textContent = 'Error contacting tutor API.';
          appendTutorMessage(`Connection/API error: ${err.message}`);
        }
      }

      async function fetchAzureToken(force = false) {
        if (!force && azureToken && Date.now() < tokenExpiresAt - 30000) {
          return { token: azureToken, region: azureRegion };
        }
        const res = await fetch('/api/azure-token', { method: 'POST' });
        if (!res.ok) {
          let detail = `${res.status}`;
          try {
            const data = await res.json();
            if (data && data.error) detail = data.error;
          } catch (_) {}
          throw new Error(detail);
        }
        const data = await res.json();
        azureToken = data.token;
        azureRegion = data.region;
        tokenExpiresAt = Date.now() + (Number(data.expiresInSeconds) || 540) * 1000;
        return { token: azureToken, region: azureRegion };
      }

      function buildPronunciationConfig(mode, words) {
        const referenceText = mode === 'word' ? words.join(' ') : '';
        const enableMiscue = mode === 'word' && referenceText.length > 0;

        const config = new SpeechSDK.PronunciationAssessmentConfig(
          referenceText,
          SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
          SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
          enableMiscue
        );
        config.enableProsodyAssessment = true;
        return config;
      }

      function createRecognizer(mode, words) {
        const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(azureToken, azureRegion);
        speechConfig.speechRecognitionLanguage = 'en-US';
        const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
        const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
        const pronConfig = buildPronunciationConfig(mode, words);
        pronConfig.applyTo(recognizer);
        return recognizer;
      }

      function setRecordingUI(recording) {
        isRecording = recording;
        if (recording) {
          recordBtn.classList.remove('from-red-600', 'to-rose-600', 'hover:from-red-700', 'hover:to-rose-700');
          recordBtn.classList.add('from-amber-500', 'to-red-500', 'hover:from-amber-600', 'hover:to-red-600');
          recordBtn.textContent = '🔴 Recording';
        } else {
          recordBtn.classList.remove('from-amber-500', 'to-red-500', 'hover:from-amber-600', 'hover:to-red-600');
          recordBtn.classList.add('from-red-600', 'to-rose-600', 'hover:from-red-700', 'hover:to-rose-700');
          recordBtn.textContent = '⏺️ Record';
        }
      }

      async function startRecording() {
        if (isRecording || !sessionConfig) return;
        if (typeof SpeechSDK === 'undefined') {
          statusEl.textContent = 'Azure Speech SDK failed to load.';
          return;
        }

        try {
          await fetchAzureToken();
        } catch (err) {
          statusEl.textContent = `Speech token error: ${err.message}`;
          return;
        }

        let recognizer;
        try {
          recognizer = createRecognizer(sessionConfig.mode, sessionConfig.words);
        } catch (err) {
          statusEl.textContent = `Speech init error: ${err.message}`;
          return;
        }

        activeRecognizer = recognizer;
        setRecordingUI(true);
        statusEl.textContent =
          sessionConfig.mode === 'word'
            ? 'Listening — say each target word clearly...'
            : 'Listening...';

        recognizer.recognizeOnceAsync(
          (result) => {
            const wasActive = activeRecognizer === recognizer;
            activeRecognizer = null;
            setRecordingUI(false);

            try {
              if (!wasActive) return;
              if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech && result.text) {
                let pron = null;
                try {
                  pron = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                } catch (e) {
                  console.warn('Pronunciation result unavailable:', e);
                }
                appendUserMessage(result.text, pron);
                pushHistory('user', result.text);
                sendToTutor(result.text, summarizeAssessment(pron));
              } else if (result.reason === SpeechSDK.ResultReason.NoMatch) {
                statusEl.textContent = 'I did not catch that. Try again.';
              } else if (result.reason === SpeechSDK.ResultReason.Canceled) {
                const c = SpeechSDK.CancellationDetails.fromResult(result);
                statusEl.textContent = c.errorDetails ? `Cancelled: ${c.errorDetails}` : 'Stopped.';
              }
            } finally {
              recognizer.close();
            }
          },
          (error) => {
            if (activeRecognizer === recognizer) activeRecognizer = null;
            setRecordingUI(false);
            statusEl.textContent = `Recognition error: ${error}`;
            try {
              recognizer.close();
            } catch (_) {}
          }
        );
      }

      function stopRecording() {
        if (!activeRecognizer) {
          statusEl.textContent = 'Stopped.';
          return;
        }
        const recognizer = activeRecognizer;
        activeRecognizer = null;
        try {
          recognizer.close();
        } catch (_) {}
        setRecordingUI(false);
        statusEl.textContent = 'Stopped.';
      }

      function showSetupError(msg) {
        if (!msg) {
          setupError.textContent = '';
          setupError.classList.add('hidden');
        } else {
          setupError.textContent = msg;
          setupError.classList.remove('hidden');
        }
      }

      async function startSession() {
        const mode = modeEl.value;
        const level = levelEl.value;
        const topic = topicEl.value.trim();
        const words = wordListEl.value
          .split(',')
          .map((w) => w.trim())
          .filter(Boolean);

        if (mode === 'conversation' && !topic) {
          showSetupError('Please enter a topic to discuss.');
          return;
        }
        if (mode === 'word' && words.length === 0) {
          showSetupError('Please enter at least one word to practise.');
          return;
        }

        showSetupError('');
        sessionConfig = { mode, level, topic, words };

        const labelDetail =
          mode === 'word' ? `Words: ${words.join(', ')}` : `Topic: ${topic}`;
        const modeLabel = mode === 'word' ? 'Pronunciation' : 'Speaking';
        sessionLabel.textContent = `${modeLabel} · ${level} · ${labelDetail}`;

        setupPanel.hidden = true;
        chatPanel.hidden = false;
        statusEl.textContent = 'Starting session...';

        try {
          const opener = await fetchOpener();
          const safeOpener = opener || 'Hello! Let\'s begin.';
          appendTutorMessage(safeOpener);
          pushHistory('assistant', safeOpener);
          await speakText(safeOpener);
          statusEl.textContent = 'Ready. Press Record and speak.';
        } catch (err) {
          appendTutorMessage(`Could not start session: ${err.message}`);
          statusEl.textContent = 'Setup error.';
        }
      }

      function resetSession() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          setVoiceAnimation(false);
        }
        if (activeRecognizer) stopRecording();

        conversationHistory.length = 0;
        chatWindow.innerHTML = '';
        sessionConfig = null;

        chatPanel.hidden = true;
        setupPanel.hidden = false;
        showSetupError('');
        setupStatus.textContent = 'Ready. Configure your session.';
      }

      // Event wiring

      modeEl.addEventListener('change', () => {
        const isWord = modeEl.value === 'word';
        topicGroup.hidden = isWord;
        wordsGroup.hidden = !isWord;
        showSetupError('');
      });

      startSessionBtn.addEventListener('click', startSession);
      resetBtn.addEventListener('click', resetSession);

      recordBtn.addEventListener('click', () => {
        if (isRecording) stopRecording();
        else startRecording();
      });

      stopBtn.addEventListener('click', stopRecording);

      speakToggle.addEventListener('click', () => {
        voiceEnabled = !voiceEnabled;
        speakToggle.textContent = voiceEnabled ? 'Voice On' : 'Voice Off';
        speakToggle.className = voiceEnabled
          ? 'text-xs rounded-lg px-2.5 py-1 bg-red-100 text-red-800 hover:bg-red-200'
          : 'text-xs rounded-lg px-2.5 py-1 bg-slate-200 text-slate-700 hover:bg-slate-300';

        if (!voiceEnabled && currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          setVoiceAnimation(false);
        }
      });

      async function init() {
        if (typeof SpeechSDK === 'undefined') {
          setupStatus.textContent = 'Azure Speech SDK failed to load.';
          return;
        }
        try {
          await fetchAzureToken(true);
          startSessionBtn.disabled = false;
          setupStatus.textContent = `Speech service ready. Tutor voice: ${sessionVoice}.`;
        } catch (err) {
          setupStatus.textContent = `Speech token error: ${err.message}`;
        }
      }

      init();
    </script>
  </body>
</html>
