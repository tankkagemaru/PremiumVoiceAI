<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice ESL Tutor Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
    <style>
      @keyframes pulseGlow {
        0%,
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(239, 68, 68, 0.35);
        }
        50% {
          transform: scale(1.04);
          box-shadow: 0 0 36px rgba(239, 68, 68, 0.35);
        }
      }

      @keyframes equalize {
        0%,
        100% {
          transform: scaleY(0.3);
        }
        50% {
          transform: scaleY(1);
        }
      }

      .voice-ring.speaking {
        animation: pulseGlow 1.1s ease-in-out infinite;
      }

      .voice-bar {
        transform-origin: bottom;
      }

      .speaking .voice-bar:nth-child(1) {
        animation: equalize 0.45s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(2) {
        animation: equalize 0.7s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(3) {
        animation: equalize 0.55s ease-in-out infinite;
      }

      .speaking .voice-bar:nth-child(4) {
        animation: equalize 0.65s ease-in-out infinite;
      }

      /* Pronunciation assessment word styling */
      .word-mispronounced {
        background: #fef08a;
        color: #78350f;
        padding: 0 4px;
        border-radius: 4px;
        text-decoration: underline wavy #ca8a04;
        text-underline-offset: 3px;
      }

      .word-omitted {
        background: #e5e7eb;
        color: #374151;
        padding: 0 4px;
        border-radius: 4px;
        text-decoration: line-through;
        font-style: italic;
      }

      .word-inserted {
        background: #ede9fe;
        color: #5b21b6;
        padding: 0 4px;
        border-radius: 4px;
        font-style: italic;
      }

      .word-low {
        background: #fde68a;
        color: #78350f;
        padding: 0 4px;
        border-radius: 4px;
      }

      .word-mid {
        background: #fef3c7;
        color: #92400e;
        padding: 0 4px;
        border-radius: 4px;
      }

      .word-prosody {
        background: #dbeafe;
        color: #1e40af;
        padding: 0 4px;
        border-radius: 4px;
      }

      /* Circular score ring */
      .score-ring {
        --size: 116px;
        --thickness: 12px;
        --score: 0;
        --ring-color: #16a34a;
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        background: conic-gradient(var(--ring-color) calc(var(--score) * 1%), #e5e7eb 0);
        display: grid;
        place-items: center;
        position: relative;
        flex-shrink: 0;
      }

      .score-ring::after {
        content: '';
        position: absolute;
        inset: var(--thickness);
        border-radius: 50%;
        background: white;
      }

      .score-ring-content {
        position: relative;
        z-index: 1;
        text-align: center;
        line-height: 1;
      }

      .score-ring-value {
        font-size: 2rem;
        font-weight: 800;
        color: #0f172a;
      }

      .score-ring-max {
        font-size: 0.7rem;
        color: #64748b;
        margin-top: 4px;
        font-weight: 600;
      }

      /* Horizontal score bars */
      .score-bar-track {
        height: 10px;
        background: #e5e7eb;
        border-radius: 999px;
        overflow: hidden;
      }

      .score-bar-fill {
        height: 100%;
        width: calc(var(--score) * 1%);
        background: var(--bar-color, #16a34a);
        border-radius: 999px;
        transition: width 0.5s ease;
      }

      /* Chat window: tall + smooth auto-scroll */
      #chatWindow {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 sm:p-6 bg-gradient-to-br from-rose-50 via-red-100 to-rose-200 text-base text-slate-800"
  >
    <div
      class="w-full max-w-2xl rounded-3xl border border-red-200/70 bg-white/95 shadow-2xl shadow-red-300/40 backdrop-blur overflow-hidden"
    >
      <div class="px-6 py-4 bg-gradient-to-r from-red-600 to-rose-500 text-white flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img
            src="https://drive.google.com/uc?export=download&id=1WBSAezD_na8I7zDovVpaMRhnlE6rmMG_"
            alt="Company logo"
            class="h-9 w-9 rounded-md bg-white/90 object-cover p-0.5"
          />
          <h1 class="text-base font-semibold tracking-wide">🎙️ Voice English Tutor</h1>
        </div>
        <span class="text-xs bg-white/20 px-3 py-1 rounded-full">PoC Widget</span>
      </div>

      <div class="p-6 space-y-5">
        <div class="flex items-center justify-between rounded-2xl bg-red-50 border border-red-100 px-4 py-3">
          <div>
            <p class="text-xs uppercase tracking-wide text-red-500 font-semibold">Tutor Voice</p>
            <p class="text-base text-red-900 font-medium">Live audio feedback</p>
          </div>
          <div id="voiceRing" class="voice-ring rounded-full bg-red-100 p-3 border border-red-200">
            <div id="voiceBars" class="flex items-end gap-1 h-6">
              <span class="voice-bar block h-2 w-1.5 rounded bg-red-500"></span>
              <span class="voice-bar block h-5 w-1.5 rounded bg-red-500"></span>
              <span class="voice-bar block h-3 w-1.5 rounded bg-red-500"></span>
              <span class="voice-bar block h-6 w-1.5 rounded bg-red-500"></span>
            </div>
          </div>
        </div>

        <!-- SETUP PANEL -->
        <section id="setupPanel" class="space-y-4">
          <h2 class="text-lg font-semibold text-slate-800">Set up your session</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="mode" class="block text-sm font-medium text-slate-700 mb-1.5">Mode</label>
              <select
                id="mode"
                class="w-full border border-red-200 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-red-400"
              >
                <option value="conversation" selected>Speaking (Conversation)</option>
                <option value="word">Pronunciation Practice</option>
              </select>
            </div>
            <div>
              <label for="level" class="block text-sm font-medium text-slate-700 mb-1.5">Level</label>
              <select
                id="level"
                class="w-full border border-red-200 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-red-400"
              >
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1" selected>B1</option>
                <option value="B2">B2</option>
              </select>
            </div>
          </div>

          <div id="topicGroup">
            <label for="topic" class="block text-sm font-medium text-slate-700 mb-1.5">
              Enter a topic to discuss
            </label>
            <div class="flex gap-2">
              <input
                id="topic"
                type="text"
                maxlength="200"
                placeholder="e.g., my favourite hobby, holidays in Malaysia"
                class="flex-1 border border-red-200 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-red-400"
              />
              <button
                id="topicSuggest"
                type="button"
                title="Suggest a random topic for your level"
                class="shrink-0 rounded-lg border border-red-200 bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-700 px-3 py-2 text-sm font-medium whitespace-nowrap"
              >
                🎲 Suggest
              </button>
            </div>
          </div>

          <div id="wordsGroup" hidden>
            <label for="wordList" class="block text-sm font-medium text-slate-700 mb-1.5">
              Enter words you want to practice
            </label>
            <div class="flex gap-2">
              <input
                id="wordList"
                type="text"
                placeholder="e.g., apple, banana, pineapple"
                class="flex-1 border border-red-200 rounded-lg px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-red-400"
              />
              <button
                id="wordSuggest"
                type="button"
                title="Suggest random words for your level"
                class="shrink-0 rounded-lg border border-red-200 bg-red-50 hover:bg-red-100 active:bg-red-200 text-red-700 px-3 py-2 text-sm font-medium whitespace-nowrap"
              >
                🎲 Suggest
              </button>
            </div>
          </div>

          <p id="setupError" class="text-sm text-red-600 hidden"></p>
          <p id="setupStatus" class="text-sm text-slate-500">Loading speech service...</p>

          <button
            id="startSessionBtn"
            disabled
            class="w-full min-h-12 bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-semibold py-3 px-4 rounded-xl text-base transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Start Session →
          </button>
        </section>

        <!-- CHAT PANEL -->
        <section id="chatPanel" hidden class="space-y-4">
          <div class="flex items-center justify-between gap-3 rounded-xl bg-red-50 border border-red-100 px-4 py-3">
            <div class="min-w-0">
              <div id="sessionLabel" class="text-sm text-red-900 font-semibold truncate"></div>
              <div id="targetIndicator" class="text-xs text-red-700 mt-0.5 hidden"></div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <button
                id="speakToggle"
                class="text-sm rounded-lg px-3 py-1.5 bg-red-100 text-red-800 hover:bg-red-200"
              >
                Voice On
              </button>
              <button
                id="resetBtn"
                class="text-sm rounded-lg px-3 py-1.5 bg-slate-100 text-slate-700 hover:bg-slate-200"
              >
                New Session
              </button>
            </div>
          </div>

          <div id="status" class="text-sm text-slate-500">Ready. Press Record and speak.</div>

          <div
            id="chatWindow"
            class="h-[32rem] overflow-y-auto border border-red-100 rounded-2xl p-4 bg-rose-50/60 space-y-4"
            aria-live="polite"
          ></div>

          <div class="flex items-center gap-3">
            <button
              id="recordBtn"
              class="flex-[2] min-h-14 whitespace-nowrap bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700 text-white font-semibold py-3 px-4 rounded-xl text-base transition disabled:opacity-50 disabled:cursor-not-allowed"
            >
              ⏺️ Record
            </button>
            <button
              id="stopBtn"
              class="px-5 py-3 min-h-14 rounded-xl border border-red-200 text-red-700 hover:bg-red-50 text-base"
            >
              Stop
            </button>
          </div>
        </section>
      </div>
    </div>

    <script>
      // ── DOM refs ─────────────────────────────────────────────────────────
      const setupPanel = document.getElementById('setupPanel');
      const chatPanel = document.getElementById('chatPanel');
      const setupError = document.getElementById('setupError');
      const setupStatus = document.getElementById('setupStatus');
      const startSessionBtn = document.getElementById('startSessionBtn');
      const sessionLabel = document.getElementById('sessionLabel');
      const targetIndicator = document.getElementById('targetIndicator');
      const resetBtn = document.getElementById('resetBtn');
      const recordBtn = document.getElementById('recordBtn');
      const stopBtn = document.getElementById('stopBtn');
      const statusEl = document.getElementById('status');
      const chatWindow = document.getElementById('chatWindow');
      const levelEl = document.getElementById('level');
      const modeEl = document.getElementById('mode');
      const topicEl = document.getElementById('topic');
      const topicGroup = document.getElementById('topicGroup');
      const wordsGroup = document.getElementById('wordsGroup');
      const wordListEl = document.getElementById('wordList');
      const topicSuggestBtn = document.getElementById('topicSuggest');
      const wordSuggestBtn = document.getElementById('wordSuggest');
      const speakToggle = document.getElementById('speakToggle');
      const voiceRing = document.getElementById('voiceRing');
      const voiceBars = document.getElementById('voiceBars');

      // ── Constants ────────────────────────────────────────────────────────
      const PASS_THRESHOLD = 80;

      const AVAILABLE_VOICES = ['alloy', 'ash', 'ballad', 'coral', 'echo', 'fable', 'onyx', 'nova', 'sage', 'shimmer'];
      const sessionVoice = AVAILABLE_VOICES[Math.floor(Math.random() * AVAILABLE_VOICES.length)];

      const SUGGESTIONS = {
        conversation: {
          A1: [
            'My family',
            'My favourite food',
            'My pet',
            'My school',
            'Things I do every day'
          ],
          A2: [
            'My daily routine',
            'Ordering food at a restaurant',
            'A trip I took last summer',
            'My weekend plans',
            'My favourite movie or TV show'
          ],
          B1: [
            'The benefits of learning a new language',
            'A memorable holiday I had',
            'Pros and cons of social media',
            'My dream job',
            'A book that changed how I think'
          ],
          B2: [
            'How technology is changing the way we communicate',
            'The role of art in society',
            'Cultural traditions worth preserving',
            'Why some people prefer city life over rural life',
            'The ethics of artificial intelligence'
          ]
        },
        word: {
          A1: [
            'apple, banana, orange',
            'cat, dog, bird',
            'red, blue, green',
            'one, two, three',
            'happy, sad, tired'
          ],
          A2: [
            'breakfast, lunch, dinner',
            'doctor, teacher, engineer',
            'kitchen, bedroom, bathroom',
            'shirt, trousers, shoes',
            'morning, afternoon, evening'
          ],
          B1: [
            'thought, through, though',
            'weather, whether, wither',
            'comfortable, vegetable, chocolate',
            'necessary, separate, definitely',
            'rhythm, schedule, restaurant'
          ],
          B2: [
            'entrepreneur, hierarchy, miscellaneous',
            'phenomenon, conscience, accommodation',
            'specifically, particularly, occasionally',
            'bourgeois, naive, rendezvous',
            'hyperbole, euphemism, onomatopoeia'
          ]
        }
      };

      function getRandomSuggestion(category, level) {
        const list = SUGGESTIONS[category]?.[level] || SUGGESTIONS[category]?.['B1'] || [];
        if (!list.length) return '';
        return list[Math.floor(Math.random() * list.length)];
      }

      // ── State ────────────────────────────────────────────────────────────
      let azureToken = null;
      let azureRegion = null;
      let tokenExpiresAt = 0;
      let activeRecognizer = null;
      let isRecording = false;
      let voiceEnabled = true;
      let currentAudio;
      let sessionConfig = null;
      let currentWordIndex = 0;
      let lastUserMessageRow = null;
      const conversationHistory = [];

      // ── Word index helpers (Pronunciation mode) ──────────────────────────
      function getCurrentTargetWord() {
        if (sessionConfig?.mode !== 'word') return null;
        if (currentWordIndex >= sessionConfig.words.length) return null;
        return sessionConfig.words[currentWordIndex];
      }

      function getNextTargetWord() {
        if (sessionConfig?.mode !== 'word') return null;
        const i = currentWordIndex + 1;
        if (i >= sessionConfig.words.length) return null;
        return sessionConfig.words[i];
      }

      function advanceWord() {
        currentWordIndex += 1;
        updateTargetIndicator();
        updateRecordButtonState();
      }

      function isSessionComplete() {
        return sessionConfig?.mode === 'word' && currentWordIndex >= sessionConfig.words.length;
      }

      function evaluateWordAttempt(pron, targetWord) {
        if (!pron?.detailResult?.Words || !targetWord) {
          return { passed: false, accuracy: null, errorType: 'NoMatch' };
        }
        const lc = targetWord.toLowerCase();
        const match = pron.detailResult.Words.find((w) => (w.Word || '').toLowerCase() === lc);
        if (!match) return { passed: false, accuracy: null, errorType: 'NoMatch' };
        const a = match.PronunciationAssessment || {};
        const errorType = a.ErrorType || 'None';
        const accuracy = typeof a.AccuracyScore === 'number' ? a.AccuracyScore : null;
        const passed = errorType === 'None' && typeof accuracy === 'number' && accuracy >= PASS_THRESHOLD;
        return { passed, accuracy, errorType };
      }

      // ── Text formatting ──────────────────────────────────────────────────
      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function formatSimpleMarkdown(text) {
        const escaped = escapeHtml(text);
        return escaped
          .replace(
            /\[([^\]]+)\]/g,
            '<span class="inline-block rounded-md bg-red-50 border border-red-200 px-2 py-0.5 text-red-800 font-medium">[$1]</span>'
          )
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>');
      }

      function splitTutorReply(text) {
        const allCorrections = [...text.matchAll(/\[([^\]]+)\]/g)].map((m) => m[1].trim()).filter(Boolean);
        const main = text.replace(/\[[^\]]+\]/g, '').replace(/\s{2,}/g, ' ').trim();
        return { corrections: allCorrections, main: main || text.trim() };
      }

      // ── Directive parsing (CONTENT only — JS owns word progression) ─────
      function extractDirectives(text) {
        let cleaned = text;
        let content = null;

        const contentMatch = cleaned.match(/<<\s*CONTENT\s*:\s*([^>]+?)\s*>>/i);
        if (contentMatch) {
          content = {};
          for (const part of contentMatch[1].split(',')) {
            const eq = part.indexOf('=');
            if (eq < 0) continue;
            const key = part.slice(0, eq).trim().toLowerCase();
            const num = Number(part.slice(eq + 1).trim());
            if (Number.isNaN(num)) continue;
            if (key === 'vocab' || key === 'vocabulary') content.vocabulary = num;
            else if (key === 'grammar') content.grammar = num;
            else if (key === 'topic') content.topic = num;
          }
          cleaned = cleaned.replace(contentMatch[0], '');
        }

        // Strip any stray TARGET directive that the model might emit out of habit
        cleaned = cleaned.replace(/<<\s*TARGET\s*:[^>]+>>/gi, '');

        cleaned = cleaned.replace(/\n{3,}/g, '\n\n').trim();
        return { content, cleaned };
      }

      // ── Score visualization helpers ──────────────────────────────────────
      function scoreColorHex(value) {
        if (value >= 80) return '#16a34a';
        if (value >= 60) return '#f59e0b';
        return '#dc2626';
      }

      function renderScoreRing(score) {
        const safe = Math.max(0, Math.min(100, Math.round(score)));
        const color = scoreColorHex(safe);
        return `
          <div class="score-ring" style="--score: ${safe}; --ring-color: ${color}">
            <div class="score-ring-content">
              <div class="score-ring-value">${safe}</div>
              <div class="score-ring-max">/ 100</div>
            </div>
          </div>
        `;
      }

      function renderScoreBar(label, value) {
        const safe = Math.max(0, Math.min(100, Math.round(value)));
        const color = scoreColorHex(safe);
        return `
          <div>
            <div class="flex items-center justify-between text-sm mb-1">
              <span class="text-slate-700">${label}</span>
              <span class="font-semibold text-slate-900">${safe} / 100</span>
            </div>
            <div class="score-bar-track">
              <div class="score-bar-fill" style="--score: ${safe}; --bar-color: ${color}"></div>
            </div>
          </div>
        `;
      }

      function pickOverallPronunciationScore(pron) {
        if (typeof pron.pronunciationScore === 'number') return pron.pronunciationScore;
        const parts = ['accuracyScore', 'fluencyScore', 'completenessScore', 'prosodyScore']
          .map((k) => pron[k])
          .filter((v) => typeof v === 'number');
        if (!parts.length) return 0;
        return parts.reduce((a, b) => a + b, 0) / parts.length;
      }

      function renderPronunciationDashboard(pron) {
        const overall = pickOverallPronunciationScore(pron);
        const bars = [];
        if (typeof pron.accuracyScore === 'number') bars.push(renderScoreBar('🎯 Accuracy', pron.accuracyScore));
        if (typeof pron.fluencyScore === 'number') bars.push(renderScoreBar('🌊 Fluency', pron.fluencyScore));
        if (typeof pron.completenessScore === 'number') bars.push(renderScoreBar('✅ Completeness', pron.completenessScore));
        if (typeof pron.prosodyScore === 'number') bars.push(renderScoreBar('🎵 Prosody', pron.prosodyScore));

        return `
          <div class="rounded-xl bg-white border border-slate-200 p-4">
            <h3 class="text-sm font-semibold text-slate-700 mb-3 uppercase tracking-wide">Pronunciation Score</h3>
            <div class="flex flex-col sm:flex-row gap-5 items-center sm:items-start">
              ${renderScoreRing(overall)}
              <div class="flex-1 w-full space-y-3">${bars.join('')}</div>
            </div>
          </div>
        `;
      }

      function renderContentDashboard(content) {
        const values = ['vocabulary', 'grammar', 'topic']
          .map((k) => content[k])
          .filter((v) => typeof v === 'number');
        if (!values.length) return '';
        const overall = values.reduce((a, b) => a + b, 0) / values.length;

        const bars = [];
        if (typeof content.vocabulary === 'number') bars.push(renderScoreBar('📚 Vocabulary', content.vocabulary));
        if (typeof content.grammar === 'number') bars.push(renderScoreBar('✏️ Grammar', content.grammar));
        if (typeof content.topic === 'number') bars.push(renderScoreBar('💬 Topic', content.topic));

        return `
          <div class="rounded-xl bg-white border border-slate-200 p-4">
            <h3 class="text-sm font-semibold text-slate-700 mb-3 uppercase tracking-wide">Content Score</h3>
            <div class="flex flex-col sm:flex-row gap-5 items-center sm:items-start">
              ${renderScoreRing(overall)}
              <div class="flex-1 w-full space-y-3">${bars.join('')}</div>
            </div>
          </div>
        `;
      }

      function wordClassFor(errorType, score) {
        switch (errorType) {
          case 'Mispronunciation':
            return 'word-mispronounced';
          case 'Omission':
            return 'word-omitted';
          case 'Insertion':
            return 'word-inserted';
          case 'UnexpectedBreak':
          case 'MissingBreak':
          case 'Monotone':
            return 'word-prosody';
          default:
            if (typeof score === 'number') {
              if (score < 60) return 'word-low';
              if (score < 80) return 'word-mid';
            }
            return '';
        }
      }

      function renderAssessedWords(words) {
        if (!Array.isArray(words) || !words.length) return '';
        return words
          .map((w) => {
            const word = escapeHtml(w.Word || '');
            const a = w.PronunciationAssessment || {};
            const errorType = a.ErrorType || 'None';
            const score = typeof a.AccuracyScore === 'number' ? a.AccuracyScore : null;
            const cls = wordClassFor(errorType, score);
            const titleParts = [];
            if (score !== null) titleParts.push(`Accuracy ${Math.round(score)}`);
            if (errorType && errorType !== 'None') titleParts.push(errorType);
            const title = titleParts.length ? ` title="${escapeHtml(titleParts.join(' · '))}"` : '';
            const cssClass = cls ? ` class="${cls}"` : '';
            return `<span${cssClass}${title}>${word}</span>`;
          })
          .join(' ');
      }

      // ── Message rendering ────────────────────────────────────────────────
      function scrollChatToBottom() {
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function appendTutorMessage(text) {
        const row = document.createElement('div');
        row.className = 'rounded-2xl bg-white border border-red-100 mr-8 p-4 space-y-3 shadow-sm';

        const { corrections, main } = splitTutorReply(text);
        const correctionBlock = corrections.length
          ? `<section class="rounded-xl border-2 border-red-300 bg-red-50 px-4 py-3 shadow-sm">
              <p class="text-xs font-semibold tracking-wide uppercase text-red-700 mb-1.5">Correction Note</p>
              ${corrections
                .map(
                  (c) =>
                    `<p class="text-base italic font-medium text-red-900"><em>${escapeHtml(c)}</em></p>`
                )
                .join('')}
            </section>`
          : '';
        const mainBlock = `<section>
            <p class="text-base"><strong class="text-red-700">Tutor:</strong> ${formatSimpleMarkdown(main || text)}</p>
          </section>`;
        row.innerHTML = `${correctionBlock}${mainBlock}`;

        chatWindow.appendChild(row);
        scrollChatToBottom();
      }

      function appendUserMessage(text, pron) {
        const row = document.createElement('div');
        row.className = 'rounded-2xl bg-red-50 border border-red-200 ml-8 p-4 space-y-4 shadow-sm';

        const words = pron && pron.detailResult && pron.detailResult.Words;
        const transcriptHtml = words && words.length ? renderAssessedWords(words) : escapeHtml(text);

        const sectionA = `
          <section>
            <p class="text-xs uppercase tracking-wide text-red-600 font-semibold mb-1.5">You said</p>
            <div class="text-base leading-relaxed text-slate-900 rounded-lg bg-white border border-slate-200 px-3 py-2">
              ${transcriptHtml || escapeHtml(text)}
            </div>
          </section>
        `;

        const sectionB = pron ? renderPronunciationDashboard(pron) : '';

        // Section C placeholder — only Speaking mode populates it later
        const sectionCWrapper =
          sessionConfig?.mode === 'conversation' ? `<div data-content-placeholder></div>` : '';

        row.innerHTML = `${sectionA}${sectionB}${sectionCWrapper}`;

        chatWindow.appendChild(row);
        scrollChatToBottom();
        lastUserMessageRow = row;
      }

      function attachContentScores(content) {
        if (!lastUserMessageRow) return;
        const placeholder = lastUserMessageRow.querySelector('[data-content-placeholder]');
        if (!placeholder) return;
        const html = renderContentDashboard(content);
        if (html) {
          placeholder.outerHTML = html;
          scrollChatToBottom();
        }
      }

      function setVoiceAnimation(isSpeaking) {
        const method = isSpeaking ? 'add' : 'remove';
        voiceRing.classList[method]('speaking');
        voiceBars.classList[method]('speaking');
      }

      function pushHistory(role, content) {
        conversationHistory.push({ role, content });
        if (conversationHistory.length > 12) {
          conversationHistory.splice(0, conversationHistory.length - 12);
        }
      }

      // ── UI helpers ───────────────────────────────────────────────────────
      function updateTargetIndicator() {
        if (!sessionConfig || sessionConfig.mode !== 'word') {
          targetIndicator.classList.add('hidden');
          return;
        }
        const total = sessionConfig.words.length;
        if (currentWordIndex >= total) {
          targetIndicator.textContent = `Session complete · ${total} of ${total} words`;
          targetIndicator.classList.remove('hidden');
          return;
        }
        const current = sessionConfig.words[currentWordIndex];
        targetIndicator.textContent = `Word ${currentWordIndex + 1} of ${total}: ${current}`;
        targetIndicator.classList.remove('hidden');
      }

      function updateRecordButtonState() {
        if (sessionConfig?.mode === 'word' && isSessionComplete()) {
          recordBtn.disabled = true;
          recordBtn.title = 'Session complete. Click "New Session" to start again.';
        } else {
          recordBtn.disabled = false;
          recordBtn.title = '';
        }
      }

      // ── TTS ──────────────────────────────────────────────────────────────
      async function speakText(text) {
        if (!voiceEnabled) return;
        const cleanText = text.replace(/\[[^\]]*\]/g, '').trim();
        if (!cleanText) return;

        try {
          const res = await fetch('/api/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: cleanText, voice: sessionVoice })
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || `TTS failed (${res.status})`);
          }

          const audioBlob = await res.blob();
          const audioUrl = URL.createObjectURL(audioBlob);

          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
          }

          currentAudio = new Audio(audioUrl);
          currentAudio.onplay = () => setVoiceAnimation(true);
          currentAudio.onpause = () => setVoiceAnimation(false);
          currentAudio.onended = () => {
            setVoiceAnimation(false);
            URL.revokeObjectURL(audioUrl);
          };
          await currentAudio.play();
        } catch (err) {
          setVoiceAnimation(false);
          console.error('TTS error:', err);
          appendTutorMessage(`[Audio unavailable: ${err.message}]`);
        }
      }

      // ── Assessment summarization (for Speaking mode user message) ────────
      function summarizeAssessment(pron) {
        if (!pron) return null;
        const scores = {};
        if (typeof pron.accuracyScore === 'number') scores.accuracy = pron.accuracyScore;
        if (typeof pron.fluencyScore === 'number') scores.fluency = pron.fluencyScore;
        if (typeof pron.completenessScore === 'number') scores.completeness = pron.completenessScore;
        if (typeof pron.prosodyScore === 'number') scores.prosody = pron.prosodyScore;

        const detailWords = pron.detailResult && pron.detailResult.Words;
        const words = Array.isArray(detailWords)
          ? detailWords.map((w) => ({
              word: w.Word || '',
              errorType: w.PronunciationAssessment?.ErrorType || 'None',
              accuracy:
                typeof w.PronunciationAssessment?.AccuracyScore === 'number'
                  ? w.PronunciationAssessment.AccuracyScore
                  : null
            }))
          : [];

        return { scores, words };
      }

      // ── Backend calls ────────────────────────────────────────────────────
      async function callChat(payload) {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Server returned ${res.status}`);
        return data.reply || '';
      }

      async function fetchOpener() {
        return callChat({
          isOpening: true,
          level: sessionConfig.level,
          mode: sessionConfig.mode,
          topic: sessionConfig.topic,
          words: sessionConfig.words,
          history: []
        });
      }

      async function sendConversationTurn(userText, assessment) {
        return callChat({
          text: userText,
          level: sessionConfig.level,
          mode: 'conversation',
          topic: sessionConfig.topic,
          assessment,
          history: conversationHistory
        });
      }

      async function sendPronunciationTurn(userText, attempt) {
        return callChat({
          text: userText,
          level: sessionConfig.level,
          mode: 'word',
          words: sessionConfig.words,
          currentWord: attempt.currentWord,
          accuracy: attempt.accuracy,
          errorType: attempt.errorType,
          passed: attempt.passed,
          nextWord: attempt.nextWord,
          sessionComplete: attempt.sessionComplete,
          history: conversationHistory
        });
      }

      function handleTutorReply(rawReply, { isOpener = false } = {}) {
        const safeReply = rawReply || 'Sorry, I could not generate a response.';
        const { content, cleaned } = extractDirectives(safeReply);

        if (content && !isOpener) {
          attachContentScores(content);
        }

        const display = cleaned || safeReply;
        appendTutorMessage(display);
        pushHistory('assistant', display);
        speakText(display);
        statusEl.textContent = isSessionComplete()
          ? 'Session complete. Press "New Session" to start again.'
          : 'Ready. Press Record and speak.';
      }

      // ── Azure Speech ─────────────────────────────────────────────────────
      async function fetchAzureToken(force = false) {
        if (!force && azureToken && Date.now() < tokenExpiresAt - 30000) {
          return { token: azureToken, region: azureRegion };
        }
        const res = await fetch('/api/azure-token', { method: 'POST' });
        if (!res.ok) {
          let detail = `${res.status}`;
          try {
            const data = await res.json();
            if (data && data.error) detail = data.error;
          } catch (_) {}
          throw new Error(detail);
        }
        const data = await res.json();
        azureToken = data.token;
        azureRegion = data.region;
        tokenExpiresAt = Date.now() + (Number(data.expiresInSeconds) || 540) * 1000;
        return { token: azureToken, region: azureRegion };
      }

      function buildPronunciationConfig(mode, referenceText) {
        const enableMiscue = mode === 'word' && referenceText.length > 0;

        const config = new SpeechSDK.PronunciationAssessmentConfig(
          referenceText,
          SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
          SpeechSDK.PronunciationAssessmentGranularity.Phoneme,
          enableMiscue
        );
        config.enableProsodyAssessment = true;
        return config;
      }

      function createRecognizer(mode, referenceText) {
        const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(azureToken, azureRegion);
        speechConfig.speechRecognitionLanguage = 'en-US';
        const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
        const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
        const pronConfig = buildPronunciationConfig(mode, referenceText);
        pronConfig.applyTo(recognizer);
        return recognizer;
      }

      function setRecordingUI(recording) {
        isRecording = recording;
        if (recording) {
          recordBtn.classList.remove('from-red-600', 'to-rose-600', 'hover:from-red-700', 'hover:to-rose-700');
          recordBtn.classList.add('from-amber-500', 'to-red-500', 'hover:from-amber-600', 'hover:to-red-600');
          recordBtn.textContent = '🔴 Recording';
        } else {
          recordBtn.classList.remove('from-amber-500', 'to-red-500', 'hover:from-amber-600', 'hover:to-red-600');
          recordBtn.classList.add('from-red-600', 'to-rose-600', 'hover:from-red-700', 'hover:to-rose-700');
          recordBtn.textContent = '⏺️ Record';
        }
      }

      async function startRecording() {
        if (isRecording || !sessionConfig) return;
        if (typeof SpeechSDK === 'undefined') {
          statusEl.textContent = 'Azure Speech SDK failed to load.';
          return;
        }
        if (sessionConfig.mode === 'word' && isSessionComplete()) {
          statusEl.textContent = 'Session complete. Press "New Session" to start again.';
          return;
        }

        try {
          await fetchAzureToken();
        } catch (err) {
          statusEl.textContent = `Speech token error: ${err.message}`;
          return;
        }

        const referenceText =
          sessionConfig.mode === 'word' ? (getCurrentTargetWord() || '') : '';

        let recognizer;
        try {
          recognizer = createRecognizer(sessionConfig.mode, referenceText);
        } catch (err) {
          statusEl.textContent = `Speech init error: ${err.message}`;
          return;
        }

        activeRecognizer = recognizer;
        setRecordingUI(true);
        statusEl.textContent =
          sessionConfig.mode === 'word'
            ? `Listening — say: "${referenceText}"`
            : 'Listening...';

        recognizer.recognizeOnceAsync(
          (result) => {
            const wasActive = activeRecognizer === recognizer;
            activeRecognizer = null;
            setRecordingUI(false);

            try {
              if (!wasActive) return;
              if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech && result.text) {
                let pron = null;
                try {
                  pron = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                } catch (e) {
                  console.warn('Pronunciation result unavailable:', e);
                }
                handleRecognitionResult(result.text, pron);
              } else if (result.reason === SpeechSDK.ResultReason.NoMatch) {
                statusEl.textContent = 'I did not catch that. Try again.';
              } else if (result.reason === SpeechSDK.ResultReason.Canceled) {
                const c = SpeechSDK.CancellationDetails.fromResult(result);
                statusEl.textContent = c.errorDetails ? `Cancelled: ${c.errorDetails}` : 'Stopped.';
              }
            } finally {
              recognizer.close();
            }
          },
          (error) => {
            if (activeRecognizer === recognizer) activeRecognizer = null;
            setRecordingUI(false);
            statusEl.textContent = `Recognition error: ${error}`;
            try {
              recognizer.close();
            } catch (_) {}
          }
        );
      }

      function handleRecognitionResult(text, pron) {
        // Display the user bubble first (Section A + Section B)
        appendUserMessage(text, pron);
        pushHistory('user', text);
        statusEl.textContent = 'Thinking...';

        if (sessionConfig.mode === 'word') {
          const targetWord = getCurrentTargetWord();
          const evaluation = evaluateWordAttempt(pron, targetWord);

          // JS owns the index — increment BEFORE sending to AI so nextWord is correct
          if (evaluation.passed) advanceWord();

          const attempt = {
            currentWord: targetWord || '',
            accuracy: evaluation.accuracy,
            errorType: evaluation.errorType,
            passed: evaluation.passed,
            nextWord: evaluation.passed ? getCurrentTargetWord() : null,
            sessionComplete: evaluation.passed && isSessionComplete()
          };

          sendPronunciationTurn(text, attempt)
            .then((reply) => handleTutorReply(reply))
            .catch((err) => {
              console.error(err);
              statusEl.textContent = 'Error contacting tutor API.';
              appendTutorMessage(`Connection/API error: ${err.message}`);
            });
        } else {
          sendConversationTurn(text, summarizeAssessment(pron))
            .then((reply) => handleTutorReply(reply))
            .catch((err) => {
              console.error(err);
              statusEl.textContent = 'Error contacting tutor API.';
              appendTutorMessage(`Connection/API error: ${err.message}`);
            });
        }
      }

      function stopRecording() {
        if (!activeRecognizer) {
          statusEl.textContent = 'Stopped.';
          return;
        }
        const recognizer = activeRecognizer;
        activeRecognizer = null;
        try {
          recognizer.close();
        } catch (_) {}
        setRecordingUI(false);
        statusEl.textContent = 'Stopped.';
      }

      // ── Setup → session ──────────────────────────────────────────────────
      function showSetupError(msg) {
        if (!msg) {
          setupError.textContent = '';
          setupError.classList.add('hidden');
        } else {
          setupError.textContent = msg;
          setupError.classList.remove('hidden');
        }
      }

      async function startSession() {
        const mode = modeEl.value;
        const level = levelEl.value;
        const topic = topicEl.value.trim();
        const words = wordListEl.value
          .split(',')
          .map((w) => w.trim())
          .filter(Boolean);

        if (mode === 'conversation' && !topic) {
          showSetupError('Please enter a topic to discuss.');
          return;
        }
        if (mode === 'word' && words.length === 0) {
          showSetupError('Please enter at least one word to practise.');
          return;
        }

        showSetupError('');
        sessionConfig = { mode, level, topic, words };
        currentWordIndex = 0;
        lastUserMessageRow = null;

        const labelDetail = mode === 'word' ? `Words: ${words.join(', ')}` : `Topic: ${topic}`;
        const modeLabel = mode === 'word' ? 'Pronunciation' : 'Speaking';
        sessionLabel.textContent = `${modeLabel} · ${level} · ${labelDetail}`;
        updateTargetIndicator();
        updateRecordButtonState();

        setupPanel.hidden = true;
        chatPanel.hidden = false;
        statusEl.textContent = 'Starting session...';

        try {
          const opener = await fetchOpener();
          handleTutorReply(opener || 'Hello! Let\'s begin.', { isOpener: true });
        } catch (err) {
          appendTutorMessage(`Could not start session: ${err.message}`);
          statusEl.textContent = 'Setup error.';
        }
      }

      function resetSession() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          setVoiceAnimation(false);
        }
        if (activeRecognizer) stopRecording();

        conversationHistory.length = 0;
        chatWindow.innerHTML = '';
        sessionConfig = null;
        currentWordIndex = 0;
        lastUserMessageRow = null;

        chatPanel.hidden = true;
        setupPanel.hidden = false;
        showSetupError('');
        targetIndicator.classList.add('hidden');
        recordBtn.disabled = false;
        recordBtn.title = '';
        setupStatus.textContent = 'Ready. Configure your session.';
      }

      // ── Event wiring ─────────────────────────────────────────────────────
      modeEl.addEventListener('change', () => {
        const isWord = modeEl.value === 'word';
        topicGroup.hidden = isWord;
        wordsGroup.hidden = !isWord;
        showSetupError('');
      });

      topicSuggestBtn.addEventListener('click', () => {
        topicEl.value = getRandomSuggestion('conversation', levelEl.value);
        showSetupError('');
      });

      wordSuggestBtn.addEventListener('click', () => {
        wordListEl.value = getRandomSuggestion('word', levelEl.value);
        showSetupError('');
      });

      startSessionBtn.addEventListener('click', startSession);
      resetBtn.addEventListener('click', resetSession);

      recordBtn.addEventListener('click', () => {
        if (isRecording) stopRecording();
        else startRecording();
      });

      stopBtn.addEventListener('click', stopRecording);

      speakToggle.addEventListener('click', () => {
        voiceEnabled = !voiceEnabled;
        speakToggle.textContent = voiceEnabled ? 'Voice On' : 'Voice Off';
        speakToggle.className = voiceEnabled
          ? 'text-sm rounded-lg px-3 py-1.5 bg-red-100 text-red-800 hover:bg-red-200'
          : 'text-sm rounded-lg px-3 py-1.5 bg-slate-200 text-slate-700 hover:bg-slate-300';

        if (!voiceEnabled && currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          setVoiceAnimation(false);
        }
      });

      async function init() {
        if (typeof SpeechSDK === 'undefined') {
          setupStatus.textContent = 'Azure Speech SDK failed to load.';
          return;
        }
        try {
          await fetchAzureToken(true);
          startSessionBtn.disabled = false;
          setupStatus.textContent = `Speech service ready. Tutor voice: ${sessionVoice}.`;
        } catch (err) {
          setupStatus.textContent = `Speech token error: ${err.message}`;
        }
      }

      init();
    </script>
  </body>
</html>
